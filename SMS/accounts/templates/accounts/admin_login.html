<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Secure Login</title>
    <!-- ✅ 16-4-26 Prevent browser caching to avoid stale CSRF token on back-navigation -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1),
                        0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .animate-up {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

</head>
<body class="flex items-center justify-center p-6">

    <!-- Django Messages (Fixed Position Toasts) -->
    <!-- {% if messages %}
    <div id="django-messages-container" class="space-y-3">
        {% for message in messages %}

            {% if message.tags == 'error' %}

            {% endif %}">
            <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center
                {% if message.tags == 'error' %} bg-red-50 {% else %} bg-green-50 {% endif %}">

    <div class="w-full max-w-md animate-up">
        <!-- Logo & Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl mb-4 shadow-xl">
                <i class="fas fa-user-shield text-indigo-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Admin Control</h1>
            <p class="text-indigo-100 mt-2 opacity-90">Secure system access for authorized personnel</p>
        </div>

        <!-- 20-4-26 Login Form Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10 space-y-4">

    {% if messages %}
    <div class="space-y-3">
        {% for message in messages %}
        <div class="django-message p-3 rounded-xl text-sm flex items-center gap-3 border
            {% if message.tags == 'error' %}
                bg-red-50 text-red-700 border-red-100
            {% else %}
                bg-green-50 text-green-700 border-green-100
            {% endif %}">
            
            <div class="w-7 h-7 flex items-center justify-center rounded-full
                {% if message.tags == 'error' %} bg-red-100 {% else %} bg-green-100 {% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
            </div>

            <span class="font-medium">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}
            <form method="post" class="space-y-6" onsubmit="return validateForm()">
                {% csrf_token %}
                
                <!-- Username -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <input 
                            type="text" 
                            name="username" 
                            id="usernameInput"
                            maxlength="20"
                            required
                            class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                            placeholder="Enter admin username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-semibold text-gray-700">Password</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input 
                            type="password" 
                            name="password" 
                            id="passwordInput"
                            minlength="8"
                            maxlength="20"
                            required
                            class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                            placeholder="••••••••"
                        >
                        <!-- Single Toggle Button -->
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-600">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember -->
                <div class="flex items-center">
                    <input id="remember" name="remember" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    <label for="remember" class="ml-2 block text-sm text-gray-600 cursor-pointer">Trust this workstation</label>
                </div>

                <!-- Submit -->
                <button 
                    type="submit" 
                    class="w-full flex justify-center items-center py-4 px-4 rounded-xl shadow-lg text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all active:scale-[0.98]"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i> Authorized Sign In
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-10 flex flex-col items-center gap-4 text-center">
            <a href="{% url 'index' %}" class="text-white/80 hover:text-white text-sm font-medium transition-colors">
                <i class="fas fa-house mr-1"></i> Return to Homepage
            </a>
            <p class="text-indigo-100/70 text-sm">Protected by 256-bit Encryption</p>
            <div class="flex justify-center gap-6 mt-2">
                <a href="#" class="text-indigo-100 hover:text-white transition-colors text-xs font-medium uppercase tracking-widest">Help Desk</a>
                <a href="#" class="text-indigo-100 hover:text-white transition-colors text-xs font-medium uppercase tracking-widest">Security Policy</a>
            </div>
        </div>
    </div>

   <script>
        // Password toggle
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');      
                icon.classList.add('fa-eye-slash');   
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash'); 
                icon.classList.add('fa-eye');          
            }
        }

        // Real-time Space Prevention
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');

        function preventSpaces(e) {
            if (e.key === " ") {
                e.preventDefault();
                return false;
            }
        }

        function sanitizeInput(e) {
            e.target.value = e.target.value.replace(/\s/g, '');
        }

        usernameInput.addEventListener('keydown', preventSpaces);
        usernameInput.addEventListener('input', sanitizeInput);
        passwordInput.addEventListener('keydown', preventSpaces);
        passwordInput.addEventListener('input', sanitizeInput);

        function validateForm() {
            const user = usernameInput.value.trim();
            const pwd = passwordInput.value;
            if (user === '' || pwd === '') return false;
            return true;
        }

        // ✅ 16-4-26 Fix 403 CSRF error on back-button navigation.
        // When browser restores page from bfcache (event.persisted = true),
        // the CSRF token is stale. Force a reload to get a fresh token from server.
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // 20-4-26 Updated Message Auto-hide for the Fixed Container
document.addEventListener("DOMContentLoaded", function () {
    const messages = document.querySelectorAll(".django-message");

    if (messages.length > 0) {
        setTimeout(() => {
            messages.forEach(msg => {
                msg.style.transition = "all 0.4s ease";
                msg.style.opacity = "0";
                msg.style.transform = "translateY(-10px)";
            });

            setTimeout(() => {
                messages.forEach(msg => msg.remove());
            }, 400);

        }, 2000); // 3 sec
    }
});
    </script>
</body>
</html>
