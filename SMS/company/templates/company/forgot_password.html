<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Login | Business Portal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            }
            .animate-fade-in {
                animation: fadeIn 0.6s ease-out forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body class="flex items-center justify-center p-6">

        <div class="w-full max-w-md animate-fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4 shadow-xl">
                    <i class="fas fa-briefcase text-indigo-600 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Forgot Password</h1>
                <p class="text-indigo-100 mt-2 opacity-90"> No worries we are here to assist you</p>
            </div>

            <div class="glass-card rounded-3xl p-8 md:p-10">

                <h1 class="text-2xl font-semibold text-gray-800 mb-2">
                    Forgot your password
                </h1>

                <p class="text-sm text-gray-500 mb-6 mt-3">
                    Please enter the email address associated with your account to receive password reset instructions.
                </p>

                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">Email</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <input 
                                type="email" 
                                name="email"
                                id="email"
                                required
                                class="block w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl
                                    text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2
                                    focus:ring-indigo-500 focus:bg-white transition-all"
                                placeholder="Enter You Email"
                            />
                            <p id="error" class="text-red-600 text-sm mt-1 hidden"></p>
                        </div>
                    </div>

                    
                    <button 
                        type="submit" 
                        class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                        Send OTP <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </form>
            </div>

            <div class="mt-8 flex flex-col items-center gap-4">
                <a href="{% url 'index' %}" class="text-white/80 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-house mr-1"></i> Return to Homepage
                </a>
                <p class="text-indigo-100/60 text-xs">
                    &copy; 2026 Enterprise Solutions. All rights reserved.
                </p>
            </div>
        </div>
    </body>
</html>
