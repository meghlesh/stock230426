<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Login | Business Portal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            }
            .animate-fade-in {
                animation: fadeIn 0.6s ease-out forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body class="flex items-center justify-center p-6">

        <div class="w-full max-w-md animate-fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4 shadow-xl">
                    <i class="fas fa-briefcase text-indigo-600 text-3xl"></i>
                </div>
                <!-- <h1 class="text-3xl font-bold text-white tracking-tight">Forgot Password</h1> -->
                <p class="text-indigo-100 mt-2 opacity-90"> No worries we are here to assist you</p>
            </div>

            <div class="glass-card rounded-3xl p-8 md:p-10">
                <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                    Reset Password
                </h2>
                <p class="text-gray-500 text-sm mb-6">
                    Enter your new password below.
                </p>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">
                            New Password
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fas fa-key"></i>
                            </div>
                            <input
                                type="password"
                                name="password"
                                id="ownerPass1"
                                maxlength="20"
                                required
                                class="block w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl
                                    text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2
                                    focus:ring-indigo-500 focus:bg-white transition-all"
                                placeholder="••••••••">

                            <button
                                type="button"
                                onclick="togglePass('ownerPass1','toggleIcon1')"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-600 z-10">
                                <i class="far fa-eye" id="toggleIcon1"></i>
                            </button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">
                            Confirm Password
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                                <i class="fas fa-key"></i>
                            </div>
                            <input
                                type="password"
                                name="confirm_password"
                                id="ownerPass2"
                                maxlength="20"
                                required
                                class="block w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl
                                    text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2
                                    focus:ring-indigo-500 focus:bg-white transition-all"
                                placeholder="••••••••">

                            <button
                                type="button"
                                onclick="togglePass('ownerPass2','toggleIcon2')"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-600 z-10">
                                <i class="far fa-eye" id="toggleIcon2"></i>
                            </button>
                        </div>
                    </div>

                    <button
                        class="w-full bg-indigo-600 hover:bg-indigo-600 text-white py-3 rounded-full font-medium transition">
                        Reset Password
                    </button>
                </form>
            </div>

            <div class="mt-8 flex flex-col items-center gap-4">
                <a href="{% url 'index' %}" class="text-white/80 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-house mr-1"></i> Return to Homepage
                </a>
                <p class="text-indigo-100/60 text-xs">
                    &copy; 2025 Enterprise Solutions. All rights reserved.
                </p>
            </div>
        </div>
    </body>

    <script>
        function togglePass(inputId, iconId) {

            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {

                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");

            }
            else {

                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const messages = document.getElementById("django-messages");
            if (messages) {
                setTimeout(() => {
                    messages.style.transition = "opacity 0.5s ease";
                    messages.style.opacity = "0";
                    setTimeout(() => {
                        messages.remove();
                    }, 500);
                }, 4000);
            }
        });
    </script>
</html>
