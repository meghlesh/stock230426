<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owner Login | Business Portal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            }
            .animate-fade-in {
                animation: fadeIn 0.6s ease-out forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body class="flex items-center justify-center p-6">

        <div class="w-full max-w-md animate-fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4 shadow-xl">
                    <i class="fas fa-briefcase text-indigo-600 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Forgot Password</h1>
                <p class="text-indigo-100 mt-2 opacity-90"> No worries we are here to assist you</p>
            </div>

            <div class="glass-card rounded-3xl p-8 md:p-10">
                <div class="text-center">

                    <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                    OTP Verification
                    </h2>
                    <p class="text-gray-500 text-sm mb-8">
                    Enter the code sent to your email
                    </p>

                    <form method="POST">
                    {% csrf_token %}
                        <div class="flex justify-center gap-3 mb-8">
                            <input id="otp1" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                            <input id="otp2" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                            <input id="otp3" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                            <input id="otp4" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                            <input id="otp5" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                            <input id="otp6" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-lg">
                        </div>

                        <input type="hidden" name="otp" id="otp_full">

                        <button
                            id="continue_btn"
                            class="w-full bg-indigo-600 text-white font-medium py-3 rounded-full">
                            Continue
                        </button>
                    </form>

                    <button
                        id="resend_btn"
                        disabled
                        class="w-full mt-4 py-3 rounded-full font-medium bg-indigo-500 text-gray-500 cursor-not-allowed">
                        00 : 59
                    </button>

                    <p id="otp_error" class="text-red-500 text-sm mt-4"></p>
                    
                </div>
            </div>

            <div class="mt-8 flex flex-col items-center gap-4">
                <a href="{% url 'index' %}" class="text-white/80 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-house mr-1"></i> Return to Homepage
                </a>
                <p class="text-indigo-100/60 text-xs">
                    &copy; 2026 Enterprise Solutions. All rights reserved.
                </p>
            </div>
        </div>
    </body>

    <script>
        (function () {

            let countdown = 59;
            let resendCount = 0;
            let timer = null;

            const timerBtn = document.getElementById("resend_btn");
            const errorBox = document.getElementById("otp_error");


            function startCountdown() {

                timerBtn.disabled = true;

                timerBtn.classList.remove("bg-indigo-500", "text-white", "cursor-pointer");
                timerBtn.classList.add("bg-gray-200", "text-gray-500", "cursor-not-allowed");

                timer = setInterval(function () {

                    let seconds = countdown < 10 ? "0" + countdown : countdown;
                    timerBtn.innerText = "00 : " + seconds;

                    countdown--;

                    if (countdown < 0) {

                        clearInterval(timer);

                        if (resendCount >= 3) {

                            timerBtn.innerText = "Limit Reached";

                            errorBox.innerText =
                                "You have reached the maximum number of OTP requests. Please try again later.";

                            return;
                        }

                        timerBtn.disabled = false;
                        timerBtn.innerText = "Resend OTP";

                        timerBtn.classList.remove("bg-gray-200", "text-gray-500", "cursor-not-allowed");
                        timerBtn.classList.add("bg-indigo-500", "text-white", "cursor-pointer");

                    }

                }, 1000);

            }


            timerBtn.addEventListener("click", function () {

                if (resendCount >= 3) return;

                fetch("{% url 'resend_otp' %}")
                .then(res => res.json())
                .then(data => {

                    resendCount++;

                    countdown = 59;

                    startCountdown();

                });

            });


            startCountdown();

        })();
    </script>

    <script>
        (function () {

            const inputs = document.querySelectorAll(".otp-input");

            inputs.forEach((input, index) => {

                input.addEventListener("input", function () {

                    this.value = this.value.replace(/[^0-9]/g, '');

                    if (this.value.length === 1 && inputs[index + 1]) {
                        inputs[index + 1].focus();
                    }

                    updateOTP();

                });


                input.addEventListener("keydown", function (e) {

                    if (e.key === "Backspace") {

                        if (this.value === "" && inputs[index - 1]) {
                            inputs[index - 1].focus();
                        }
                    }
                });
            });


            function updateOTP() {

                let otp = "";

                inputs.forEach(function (input) {
                    otp += input.value;
                });

                document.getElementById("otp_full").value = otp;
            }
        })();
    </script>
</html>
